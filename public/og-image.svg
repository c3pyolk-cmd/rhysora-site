<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e1a"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="#2dd4bf"/>
  <text x="108" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#0a0e1a">R</text>

  <!-- Rhysora wordmark -->
  <text x="160" y="120" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#f1f5f9">Rhysora</text>

  <!-- Tagline pill -->
  <rect x="80" y="260" width="360" height="44" rx="22" fill="#1a2234" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text x="260" y="289" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="17" fill="#94a3b8">Synthetic data, honestly built</text>

  <!-- Main headline -->
  <text x="80" y="380" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="600" fill="#f1f5f9" letter-spacing="-1.5">Synthetic UK primary-care</text>
  <text x="80" y="452" font-family="Inter, -apple-system, sans-serif" font-size="58" font-weight="600" fill="#f1f5f9" letter-spacing="-1.5">data <tspan fill="#2dd4bf">you can defend.</tspan></text>

  <!-- Bottom marker line -->
  <rect x="80" y="540" width="60" height="3" fill="#2dd4bf"/>
  <text x="80" y="574" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#94a3b8">rhysora.com</text>
</svg>
